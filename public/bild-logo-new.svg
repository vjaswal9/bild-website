<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Transparent background -->
  <rect width="320" height="200" rx="18" ry="18" fill="transparent"/>

  <!-- Crown -->
  <g transform="translate(160, 38)" fill="#C9A84C">
    <!-- Crown base -->
    <rect x="-22" y="18" width="44" height="8" rx="2"/>
    <!-- Crown points -->
    <polygon points="0,-18 -6,14 6,14" />
    <polygon points="-18,-8 -22,14 -10,14" />
    <polygon points="18,-8 22,14 10,14" />
    <!-- Crown dots -->
    <circle cx="0" cy="-20" r="3.5"/>
    <circle cx="-20" cy="-10" r="3"/>
    <circle cx="20" cy="-10" r="3"/>
  </g>

  <!-- B.I.L.D -->
  <text
    x="160"
    y="128"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58"
    font-weight="700"
    letter-spacing="6"
    fill="#374151"
  >B.I.L.D</text>

  <!-- Decorative line left -->
  <line x1="52" y1="153" x2="118" y2="153" stroke="#C9A84C" stroke-width="1.2"/>
  <!-- ESTD 2019 -->
  <text
    x="160"
    y="158"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    letter-spacing="5"
    fill="#C9A84C"
  >ESTD  2019</text>
  <!-- Decorative line right -->
  <line x1="202" y1="153" x2="268" y2="153" stroke="#C9A84C" stroke-width="1.2"/>
</svg>
